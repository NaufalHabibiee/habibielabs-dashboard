<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HabibieLabs — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1c1c1c;
      --border: #262626;
      --green: #00c805;
      --green-dim: #00a004;
      --text: #f5f5f5;
      --text-muted: #8a8a8a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Subtle grid background */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 200, 5, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 200, 5, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(circle, rgba(0, 200, 5, 0.12), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 1;
      padding: 56px 24px 32px;
      text-align: center;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green);
      font-family: "JetBrains Mono", monospace;
      margin-bottom: 20px;
    }

    .logo-mark::before {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    h1 .accent { color: var(--green); }

    .subtitle {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 440px;
      margin-left: auto;
      margin-right: auto;
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      width: 100%;
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 24px 64px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.5s ease forwards;
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.12s; }
    .card:nth-child(3) { animation-delay: 0.19s; }
    .card:nth-child(4) { animation-delay: 0.26s; }
    .card:nth-child(5) { animation-delay: 0.33s; }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--green-dim);
      background: var(--surface-hover);
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--green);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .card:hover::after { transform: scaleX(1); }

    .icon {
      font-size: 32px;
      width: 56px;
      height: 56px;
      display: grid;
      place-items: center;
      background: rgba(0, 200, 5, 0.08);
      border: 1px solid rgba(0, 200, 5, 0.2);
      border-radius: 12px;
    }

    .card h2 {
      font-size: 1.25rem;
      font-weight: 500;
    }

    .card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      flex: 1;
    }

    .card .url {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card .url .arrow {
      transition: transform 0.25s ease;
    }

    .card:hover .url .arrow {
      transform: translateX(4px);
    }

    .status-dot {
      position: absolute;
      top: 22px;
      right: 22px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
    }

    .status-dot.soon {
      background: var(--text-muted);
      box-shadow: none;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.82rem;
      font-family: "JetBrains Mono", monospace;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <header>
    <div class="logo-mark">habibielabs.com</div>
    <h1>Habibie<span class="accent">Labs</span></h1>
    <p class="subtitle">Personal suite of AI-powered tools. Pilih aplikasi di bawah untuk mulai.</p>
  </header>

  <main>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    &copy; <span id="year"></span> habibielabs.com — built &amp; deployed by Prof X
  </footer>

  <script>
    // ====== EDIT LINK SUBDOMAIN DI SINI ======
    const apps = [
      {
        icon: "📊",
        name: "Stock Agent",
        desc: "AI-powered stock analysis dengan confidence score, price target, dan risk label real-time.",
        url: "https://stock.habibielabs.com",
        live: true,
      },
      {
        icon: "💰",
        name: "Finance Tracker",
        desc: "Lacak portfolio dan transaksi keuangan pribadi dalam satu tempat.",
        url: "https://finance.habibielabs.com",
        live: true,
      },
      {
        icon: "🌤️",
        name: "Weather",
        desc: "Cuaca real-time, forecast, dan alert untuk lokasi yang kamu pilih.",
        url: "https://weather.habibielabs.com",
        live: true,
      },
      {
        icon: "🔗",
        name: "Link Shortener",
        desc: "Pendekkan URL panjang dengan custom slug, QR code, password protect, dan analytics klik.",
        url: "https://go.habibielabs.com",
        live: true,
      },
      {
        icon: "📚",
        name: "FlowDo",
        desc: "Pomodoro timer dengan task manager terintegrasi untuk fokus belajar dan produktivitas.",
        url: "https://flowdo.habibielabs.com",
        live: true,
      },
    ];
    // ==========================================

    const grid = document.getElementById("grid");
    apps.forEach((app) => {
      const card = document.createElement("a");
      card.className = "card";
      card.href = app.url;
      if (app.live) {
        card.target = "_blank";
        card.rel = "noopener";
      }
      card.innerHTML = `
        <span class="status-dot ${app.live ? "" : "soon"}"></span>
        <div class="icon">${app.icon}</div>
        <h2>${app.name}</h2>
        <p>${app.desc}</p>
        <span class="url">
          ${app.live ? app.url.replace("https://", "") : "coming soon"}
          ${app.live ? '<span class="arrow">→</span>' : ""}
        </span>
      `;
      grid.appendChild(card);
    });

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
